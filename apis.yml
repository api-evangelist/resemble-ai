name: Resemble AI
kind: company
description: >-
  Resemble AI is a voice cloning, TTS, voice conversion, and voice agent platform. The Resemble REST API at
  https://api.resemble.ai exposes synchronous synthesis, HTTP streaming, WebSocket streaming, voice
  creation/cloning/design, speech-to-speech conversion, speech-to-text, audio editing, deepfake detection/watermarking,
  and AI agents with knowledge bases. Public OpenAPI 3.1 published.
