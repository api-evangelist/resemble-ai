specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Resemble AI
providerId: resemble-ai
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Voice
- TTS
- Voice Cloning
- Audio
- Rate Limiting
- Quotas
- Throttling
description: >-
  Resemble caps API throughput primarily through plan-based concurrency. Enterprise plans
  unlock higher concurrency limits, SLAs, and SOC 2 compliance. Specific HTTP RPS limits
  are not publicly documented.
notes: Plan tier (Flex vs Enterprise) is the documented scaling lever; verify HTTP RPS limits with Resemble support.
sources:
- https://www.resemble.ai/pricing/
- https://docs.resemble.ai/
responseCodes:
  throttled: 429
limits:
- name: Concurrent Connections (Flex)
  scope: account
  metric: concurrent_connections
  limit: see Flex plan
  notes: Flex tier concurrency cap; enterprise customers receive higher limits.
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Streaming Choice
  description: Use HTTP streaming or WebSocket streaming for low-latency TTS to reduce per-request overhead.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
