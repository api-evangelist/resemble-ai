          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of custom pronunciations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Custom Pronunciations_listPronunciations_Response_200'
    post:
      operationId: create-pronunciation
      summary: Create custom pronunciation
      description: Upload a single pronunciation with a reference audio file.
      tags:
        - subpackage_customPronunciations
      parameters:
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Pronunciation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Custom Pronunciations_createPronunciation_Response_201'
        '422':
          description: Validation error (e.g., duplicate word)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                word:
                  type: string
                  description: >-
                    The word or phrase (2-100 characters). Letters, accented characters, apostrophes, hyphens, and
                    spaces only.
                audio:
                  type: string
                  format: binary
                  description: Reference audio file (wav, flac, mp3, m4a, ogg, webm, aac). Duration 200ms-10s. Max 10MB.
              required:
                - word
                - audio
  /pronunciations/bulk:
    post:
      operationId: bulk-create-pronunciations
      summary: Bulk create pronunciations from ZIP
      description: >-
        Upload multiple pronunciations at once. Each audio file in the ZIP becomes a pronunciation — the filename
        (without extension) is used as the word.
      tags:
        - subpackage_customPronunciations
      parameters:
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
