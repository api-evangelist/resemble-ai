              schema:
                $ref: '#/components/schemas/Error'
  /detect/batch:
    post:
      operationId: create-detect-batch
      summary: Create a batch deepfake detection job
      description: |
        Submit up to 50 files in a single request and process them as a single logical
        group. Returns HTTP 202 with a batch UUID; each file is analyzed in the
        background and individual results are available via `GET /detect/{uuid}` for
        each entry in `detect_uuids`.

        Two intake methods:

        - **Multiple media files** — repeated `files[]` form fields.
        - **Single zip archive** — a single `file` form field whose value is a `.zip`
          containing the media files. Non-media entries are skipped.

        Provide one of `files[]` or `file=<...>.zip` per request. Synchronous mode
        (`Prefer: wait`) is not supported and returns 400 if sent.

        Constraints:

        - Maximum 50 files per batch.
        - Maximum 500 MB total upload size across all files.
        - Allowed file types match `POST /detect`'s direct-upload allowlist.
        - All-or-nothing billing: if the team's wallet cannot cover the projected cost
          for every file, the request is rejected with 402 and no detects are created.
      tags:
        - subpackage_deepfakeDetection
      parameters:
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deepfake Detection_createDetectBatch_Response_202'
        '400':
          description: >-
            Invalid batch request (missing files, both file and files[] supplied, file count or size exceeded,
            unsupported file type, or `Prefer: wait` header sent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Insufficient balance for the projected batch cost. Response `details` includes per-file estimates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Intelligence detect limit reached (Default plan).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files[]:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more media files. Repeat the `files[]` field for each file. Mutually exclusive with `file`.
                file:
                  type: string
                  format: binary
                  description: A single `.zip` archive containing media files. Mutually exclusive with `files[]`.
                callback_url:
                  type: string
                  format: uri
                  description: POST destination invoked when the batch reaches a terminal state.
                intelligence:
                  type: boolean
                  default: false
                  description: Run multimodal intelligence on every file in the batch.
                search_identity:
                  type: boolean
                  default: false
                  description: Run identity search against the team's saved identities (audio/video only).
                visualize:
                  type: boolean
                  default: true
                  description: Generate visualization artifacts.
                audio_source_tracing_enabled:
                  type: boolean
                  default: false
                  description: Enable audio source tracing on each audio file.
                frame_length:
                  type: integer
                  description: Window size in seconds (audio/video).
                start_region:
                  type: number
                  format: double
                  description: Start of segment to analyze (seconds).
                end_region:
                  type: number
                  format: double
                  description: End of segment to analyze (seconds).
                max_video_secs:
                  type: number
                  format: double
                  description: Cap processed video duration.
                use_llm:
                  type: boolean
                  description: Use LLM-assisted video analysis.
                zero_retention_mode:
                  type: boolean
                  default: false
                  description: Enable Zero Retention Mode for every file in the batch.
  /detect/batch/{uuid}:
    get:
      operationId: get-detect-batch
      summary: Get batch status
      description: |
        Retrieve the latest aggregate status for a batch. The response shape mirrors
        the create response — `status`, `completed_count`, and `failed_count` update
        as child detects progress. Use the `detect_uuids` array to fetch per-file
        results via `GET /detect/{uuid}`.
