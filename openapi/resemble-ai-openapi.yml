  /secure_uploads:
    post:
      operationId: create-secure-upload
      summary: Upload media securely
      description: |
        Upload a media file and receive a short-lived token that can be passed to
        downstream endpoints (such as `/detect` and `/intelligence`) in place of a
        public URL. The returned token is a JWT that expires 1 hour after issuance.

        Keeping uploads private avoids exposing source media on the open internet and
        means you do not need to host files yourself for jobs that only need the API
        to read them once.
      tags:
        - subpackage_secureUploads
      parameters:
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secure Uploads_createSecureUpload_Response_200'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file to upload (audio, image, or video).
              required:
                - file
  /detect:
    get:
      operationId: list-detections
      summary: List all detects
      description: Retrieve a paginated list of all detect objects for the authenticated user's team
      tags:
        - subpackage_deepfakeDetection
      parameters:
        - name: page
          in: query
          description: Page number (must be >= 1)
          required: true
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of items per page (10-1000)
          required: false
          schema:
            type: integer
            default: 10
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of detects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deepfake Detection_listDetections_Response_200'
    post:
      operationId: create-detection
      summary: Create deepfake detection
      description: >
        Analyze audio, image, and video for deepfake detection.


        Supply media via one of three intake methods:


        - **Direct file upload** — `multipart/form-data` with the file attached as `file`. Files must be 150 MB or
        smaller and use one of the supported audio/video/image extensions. For larger files, use the secure upload flow.

        - **Public URL** — `application/json` with a `url` field. The API fetches the URL itself.

        - **Secure upload token** — `application/json` with a `media_token` field obtained from `POST /secure_uploads`.


        Exactly one of `file`, `url`, or `media_token` must be provided per request.
      tags:
        - subpackage_deepfakeDetection
      parameters:
        - name: Authorization
          in: header
          description: API token from https://app.resemble.ai/account/api
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detection job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deepfake Detection_createDetection_Response_200'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file to analyze (audio, video, or image). Must be 150 MB or smaller.
                callback_url:
                  type: string
                  format: uri
                  description: POST destination when analysis completes
                visualize:
                  type: boolean
                  description: Generate visualization artifacts
                frame_length:
                  type: integer
                  default: 2
                  description: Window size in seconds (audio/video)
                start_region:
                  type: number
                  format: double
                  description: Start of segment to analyze (seconds)
                end_region:
                  type: number
                  format: double
                  description: End of segment to analyze (seconds)
                max_video_secs:
                  type: number
                  format: double
                  description: Cap processed duration
                model_types:
                  $ref: '#/components/schemas/DetectPostRequestBodyContentMultipartFormDataSchemaModelTypes'
                  description: Use talking_head for face-swaps
                intelligence:
                  type: boolean
                  default: false
                  description: Run multimodal intelligence analysis on the media
                audio_source_tracing:
                  type: boolean
                  default: false
                  description: Enable audio source tracing to identify synthetic audio origin
                use_reverse_search:
                  type: boolean
                  default: false
                  description: >-
                    Enable reverse image search to improve detection accuracy for image files. Only applies to image
                    detections.
                use_ood_detector:
                  type: boolean
                  default: false
                  description: Enable out-of-distribution detection
                zero_retention_mode:
                  type: boolean
                  default: false
                  description: Enable Zero Retention Mode to automatically delete submitted media after detection completes.
              required:
                - file
  /detect/{uuid}:
    get:
      operationId: get-detection
      summary: Get deepfake detection result
      description: Get deepfake detection result by UUID
      tags:
        - subpackage_deepfakeDetection
      parameters:
        - name: uuid
          in: path
          description: The UUID of the detect object
          required: true
          schema:
            type: string
        - name: Authorization
