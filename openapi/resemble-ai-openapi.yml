    DetectBatchStatus:
      type: string
      enum:
        - processing
        - completed
        - partially_failed
        - failed
      description: |
        Aggregate status across all child detects.
          - `processing` — at least one child detect is still running.
          - `completed` — every child detect completed successfully.
          - `partially_failed` — at least one succeeded and at least one failed.
          - `failed` — every child detect failed.
      title: DetectBatchStatus
    DetectBatch:
      type: object
      properties:
        uuid:
          type: string
          description: Batch UUID.
        status:
          $ref: '#/components/schemas/DetectBatchStatus'
          description: |
            Aggregate status across all child detects.
              - `processing` — at least one child detect is still running.
              - `completed` — every child detect completed successfully.
              - `partially_failed` — at least one succeeded and at least one failed.
              - `failed` — every child detect failed.
        total_files:
          type: integer
          description: Number of files in the batch (1–50).
        completed_count:
          type: integer
          description: Number of child detects that have completed successfully.
        failed_count:
          type: integer
          description: Number of child detects that have failed.
        created_at:
          type: string
          format: date-time
        detect_uuids:
          type: array
          items:
            type: string
          description: UUIDs of the child detects. Use `GET /detect/{uuid}` to retrieve per-file results.
      description: Aggregate state for a batch detection job. Returned by `POST /detect/batch` and `GET /detect/batch/{uuid}`.
      title: DetectBatch
